<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors playground</title>
  <link rel="stylesheet" href="../css/colors.css" />
</head>
<body>
  <div class="root">
    <dl class="box">
      <dt>Lightness:</dt>
      <dd><input type="range" id="lightness" name="lightness" min="0" max="100" step="1" value="50" /></dd>
      <dt>Chroma:</dt>
      <dd><input type="range" id="chroma" name="chroma" min="0" max="0.4" step="0.01" value="0.2" /></dd>
      <dt>Hue:</dt>
      <dd><input type="range" id="hue" name="hue" min="0" max="360" step="1" value="180" /></dd>
      <dt>Opacity:</dt>
      <dd><input type="range" id="opacity" name="opacity" min="0" max="1" step="0.05" value="1" /></dd>
    </dl>

    <div class="color-container"></div>

    <div class="color-value box">
      oklch(<span class="l"></span>% <span class="c"></span> <span class="h"></span> / <span class="a"></span>)
    </div>
  </div>

  <script type="text/javascript" src="../js/colors.js"></script>
</body>
</html>
